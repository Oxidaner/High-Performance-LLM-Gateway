server:
  host: 0.0.0.0
  port: 8080
  mode: debug

logger:
  level: info
  format: console
  output_path: stdout

database:
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  name: LLM_GateWay

redis:
  address: redis:6379
  password: ""
  db: 1

python_worker:
  address: http://mock-embedding-worker:8081
  timeout: 5s
  retry_max: 3
  retry_backoff: 300ms
  health_ttl: 10s

providers:
  openai:
    api_key: docker-openai-key
    base_url: http://mock-openai:8090/v1
  anthropic:
    api_key: docker-anthropic-key
    base_url: http://mock-openai:8090/v1
  minimax:
    api_key: docker-minimax-key
    base_url: http://mock-openai:8090/v1

cache:
  enabled: true
  similarity_threshold: 0.95
  ttl: 604800
  l1_ttl: 3600
  max_cache_size: 100000

ratelimit:
  global_qps: 5000
  burst: 500
  max_tokens: 128000
  model_limits:
    gpt-4: 1000
    gpt-3.5-turbo: 3000
    claude-3-haiku: 2000

models:
  - name: gpt-4
    provider: openai
    weight: 5
    fallback: gpt-3.5-turbo
    max_context: 8192
    tokenizer: tiktoken
    is_active: true

  - name: gpt-3.5-turbo
    provider: openai
    weight: 3
    max_context: 16385
    tokenizer: tiktoken
    is_active: true

  - name: claude-3-haiku
    provider: anthropic
    weight: 2
    max_context: 200000
    tokenizer: anthropic
    is_active: true

workflow:
  replay_log_path: logs/workflow_replay.jsonl
  route_policies:
    planning: gpt-3.5-turbo
    execution: gpt-4
    summarization: gpt-3.5-turbo

monitoring:
  prometheus:
    enabled: false
    port: 9090
  otlp:
    enabled: true
    endpoint: otel-collector:4318
    insecure: true
